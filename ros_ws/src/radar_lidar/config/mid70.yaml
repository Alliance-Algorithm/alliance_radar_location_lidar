radar_lidar_node:
  ros__parameters:
    map_path: ""
    scan_topic: "/livox/lidar"
    hardware_id: "livox_mid70"
    output_frame: "map"
    detection_enabled: true

    gicp_num_threads: 4
    gicp_max_corr_distance: 1.0
    gicp_max_iterations: 48
    gicp_use_spherical_grid: true
    gicp_spherical_grid_deg: 0.1
    gicp_accumulate_frames: 20
    gicp_use_lock_strategy: true
    gicp_lock_fitness: 0.2
    gicp_use_roi: false
    gicp_roi_x_min: 0.0
    gicp_roi_x_max: 30.0
    gicp_roi_y_min: -15.0
    gicp_roi_y_max: 15.0
    gicp_roi_z_min: 0.0
    gicp_roi_z_max: 7.0

    dynamic_distance_threshold: 0.1
    dynamic_num_threads: 12
    dynamic_accumulate_frames: 3
    dynamic_use_roi: true
    dynamic_roi_x_min: 0.0
    dynamic_roi_x_max: 30.0
    dynamic_roi_y_min: -15.0
    dynamic_roi_y_max: 15.0
    dynamic_roi_z_min: 0.0
    dynamic_roi_z_max: 1.4

    cluster_tolerance: 0.25
    cluster_min_size: 5
    cluster_max_size: 1000

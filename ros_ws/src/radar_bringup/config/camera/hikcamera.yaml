hikcamera_ros_driver_node:
  ros__parameters:
    # 白平衡（单次自动）
    white_balance_blue: 512
    white_balance_red: 512
    white_balance_green: 512
    auto_white_balance: 1

    # 曝光与增益（室内低噪）
    exposure_us: 20000.0
    gain: 0.0

    # 帧率（CS200-10UC USB3 稳定 20fps）
    framerate: 20.0

    # 分辨率由 SDK 默认: 1920×1080
    # 全分辨率 5472×3648 可用但 USB3 带宽受限且处理开销大

    # 相机控制
    timeout_ms: 2000
    invert_image: false
    software_sync: false
    trigger_mode: false
    fixed_framerate: true

    # 图像话题
    image_topic: "/camera/image_raw"

    # 共享内存名
    shm_name: "/hikcamera_shm"
